<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Utility Hub | Potion Recipes</title>
    <style>
        body { background-color: #1a1a1a; color: #f0f0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .header { background: #388e3c; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .search-bar { width: 80%; padding: 12px; font-size: 18px; border-radius: 25px; border: none; margin-bottom: 30px; }
        .potion-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #2d2d2d; border: 1px solid #444; border-radius: 15px; padding: 20px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #4caf50; }
        .btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 MC Utility Hub</h1>
            <p>Faster than Wiki - Updated for 1.21</p>
        </div>
        <input type="text" class="search-bar" placeholder="Search Potion (Strength, Speed...)" id="myInput">
        
        <div class="potion-grid">
            <div class="card">
                <h3>Strength Potion</h3>
                <p>Effect: +3 Melee Damage</p>
                <p>Main Item: <b>Blaze Powder</b></p>
                <button class="btn">Full Recipe</button>
            </div>
            <div class="card">
                <h3>Speed Potion</h3>
                <p>Effect: +20% Speed</p>
                <p>Main Item: <b>Sugar</b></p>
                <button class="btn">Full Recipe</button>
            </div>
        </div>
    </div>
</body>
</html>
